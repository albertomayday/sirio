name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Verificar deploy (health check)
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deploy_url }}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL")
            echo "Intento $i → HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ $DEPLOY_URL online"
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Summary
        if: success()
        run: |
          echo "### ✅ Deploy exitoso" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **URL:** ${{ steps.deploy.outputs.deploy_url }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\` · Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
